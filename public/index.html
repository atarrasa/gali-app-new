<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a2a33" />
  <title>Galicia · Nuestro viaje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Pantalla de bienvenida: elegir quién eres -->
  <div id="whoScreen" class="who-screen">
    <div class="who-inner">
      <div class="who-beam"></div>
      <p class="who-eyebrow">Costa da Morte · Rías · Fin do mundo</p>
      <h1 class="who-title">Nuestro viaje<br/>a Galicia</h1>
      <p class="who-sub">7 noches desde Santiago · julio 2026</p>
      <p class="who-question">¿Quién eres?</p>
      <div class="who-buttons">
        <button class="who-btn" data-user="a"><span class="who-dot dot-a"></span><span id="nameA">Álvaro</span></button>
        <button class="who-btn" data-user="b"><span class="who-dot dot-b"></span><span id="nameB">Diana</span></button>
      </div>
    </div>
  </div>

  <!-- App principal -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark"></span>
          <span class="brand-text">Galicia</span>
        </div>
        <div class="topbar-right">
          <div class="progress-mini" id="progressMini" title="Progreso"></div>
          <button class="me-chip" id="meChip"><span class="me-dot"></span><span id="meName">—</span></button>
        </div>
      </div>
      <nav class="daynav" id="daynav"></nav>
    </header>

    <div class="subbar" id="subbar">
      <div class="countdown" id="countdown"></div>
      <button class="filter-toggle" id="filterToggle">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none"><path d="M3 5h18M6 12h12M10 19h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span id="filterLabel">Ver todo</span>
      </button>
    </div>

    <main class="content" id="content"></main>

    <!-- Barra inferior -->
    <div class="fab-bar">
      <button class="fab" id="addStopBtn" aria-label="Añadir parada">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        <span>Añadir parada</span>
      </button>
    </div>
  </div>

  <!-- Modal genérico -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
